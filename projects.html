        <nav>

                <li><a href="materials.html">Cost Tracking</a></li>

        </nav>
        </div>

        <div class="px-6 py-4 bg-gray-800 rounded-lg flex items-center space-x-1">

            <div class="flex items-center space-x-1">
            <img src="img/setting.png" alt="" class="w-6 h-6">

            </div> /

            <div class="flex items-center space-x-1">

            </div>
        </div>

 <main class=" p-6 w-full md:w-4/5  right-0 main absolute" id="main-width">
    <div id="projectPage" class="">
        <header class="flex items-center justify-between bg-white px-6 py-4 shadow-md rounded-lg">
              
             <button class="bg-orange-600 px-4 py-2 rounded-lg hover:bg-orange-700 transform hover:scale-105 transition text-white text-sm" id="openProjectModal">
                    Add Project
                </button>

            <h1 class="text-2xl text-center font-bold">Projects</h1>

                <div class="form-container z-20 " id="projectModal">
          
        <div class=" form " >
            <form action="" id="projectForm">

                <div class="flex items-center justify-between mb-2 ">
                  <div id="projectMsg"></div>
                  <img src="img/close.png" alt="" class="w-6 h-6 cursor-pointer" id="closeProjectModal">
                </div>

                 <input type="text" name="" id="projectNameInput" placeholder="Project Name" > <br>

                <input type="number" name="" id="projectBudgetInput" placeholder="Budget"> <br>

                <button id="projectAddBtn">Add</button>
                    
            </form>
            </div>
        </div>
        


            <div class="flex items-center space-x-2">
                <p><a href="/notifications" class="text-blue-700 hover:underline font-semibold">Notification</a></p>
                <img src="img/profile.png" alt="" class="w-6 h-6 cursor-pointer">

                
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" id="openSideNav" style="cursor: pointer;" class="md:hidden">
                <path fill="none" stroke="#a5a5a5" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 17h14M5 12h14M5 7h14" />
                </svg>
            </div>

        </header>

            <div class="grid grid-cols md:grid-cols-4 gap-6 mt-6" id="projectCardContainer"> </div>
                
    
    </div>
    </main>
<script>
    const sideNav = document.getElementById('sideNav');
    const openSideNav = document.getElementById('openSideNav');
    const mainWidth = document.getElementById('main-width');

    let isSideNavOpen = true;

    const navOpen = localStorage.getItem('sideNavOpen');

    if (navOpen === 'true') {
        sideNav.classList.remove('hidden');
        isSideNavOpen = true;
    }
    else {
         sideNav.classList.add('hidden');
    }

    openSideNav.addEventListener('click', () => {
        if (isSideNavOpen) {
            sideNav.classList.remove('hidden');
            localStorage.setItem('sideNavOpen', 'open');
        } else {
            sideNav.classList.add('hidden');
            localStorage.setItem('sideNavOpen', 'close');
        }
    

        isSideNavOpen = !isSideNavOpen;
    });
</script>

<script src="js/script.js"></script>
</body>
</html>
